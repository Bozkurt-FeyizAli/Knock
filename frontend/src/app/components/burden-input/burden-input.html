<div class="flex flex-col gap-5 mt-6 relative">

  <!-- Signal Sent Flash -->
  @if (signalSentFlash) {
    <div class="absolute inset-0 z-50 flex items-center justify-center pointer-events-none">
      <span class="signal-sent-text font-mono text-sm tracking-[0.4em] uppercase text-[var(--phosphor)]"
            style="text-shadow: 0 0 12px var(--phosphor), 0 0 30px rgba(0,255,65,0.5);">
        ✓ SIGNAL SENT
      </span>
    </div>
  }

  <!-- Label: whispered invitation -->
  <label for="burden" class="font-serif italic text-amber-100/80 text-lg sm:text-xl drop-shadow-md tracking-wide leading-relaxed">
    "What are you carrying?<br class="sm:hidden"> Which badge would you like to take off?"
  </label>

  <!-- The Whisper Field -->
  <div class="relative group">
    <!-- Kağıt dokusu efekti (yeni) -->
    <div class="absolute inset-0 rounded opacity-[0.03] pointer-events-none"
         style="background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.03) 3px, rgba(255,255,255,0.03) 4px);">
    </div>
    
    <textarea
      id="burden"
      [(ngModel)]="userText"
      rows="4"
      class="whisper-field w-full text-amber-200 rounded p-4 font-mono text-sm sm:text-base resize-none focus:outline-none leading-relaxed placeholder:italic"
      placeholder="Whisper your signal here..."
      (keydown.enter)="onSubmit()"
    ></textarea>
    
    <!-- Corner glow -->
    <div class="absolute -inset-1 rounded opacity-0 group-focus-within:opacity-100 transition-opacity duration-700 pointer-events-none"
         style="background: radial-gradient(ellipse at 50% 0%, rgba(217,119,6,0.08) 0%, transparent 70%);">
    </div>

    <!-- Karakter sayacı (yeni) -->
    <div class="absolute bottom-3 right-3 text-[9px] text-amber-800/25 font-mono tracking-wider opacity-0 group-focus-within:opacity-100 transition-opacity duration-500">
      {{ userText.length }} chars
    </div>
  </div>

  <!-- The Badge Drop Zone -->
  <div class="self-start relative cursor-pointer group mt-3"
       (click)="onSubmit()"
       [class.pointer-events-none]="!userText.trim() || isDropping"
       [class.opacity-100]="userText.trim()"
       [class.opacity-40]="!userText.trim()">

    <!-- Metal zincir efekti (yeni) -->
    <div class="absolute -top-5 left-1/2 -translate-x-1/2 w-px h-5 bg-gradient-to-b from-amber-700/20 to-amber-700/5"
         [class.opacity-0]="!userText.trim()"></div>

    <div class="relative"
         [class]="isDropping ? 'badge-drop-anim' : ''">

      <!-- The Sheriff Badge (güncellendi) -->
      <div class="sheriff-badge w-20 h-20 sm:w-24 sm:h-24 rounded-full flex items-center justify-center relative z-10 transition-all duration-500"
           [style.opacity]="isDropping ? '0' : '1'"
           [class.group-hover:scale-110]="!isDropping"
           [class.group-hover:shadow-[0_0_25px_rgba(217,119,6,0.3)]]="!isDropping">
           
        <!-- Dış halka parlaklığı -->
        <div class="absolute inset-0 rounded-full border-2 border-amber-600/40"
             style="box-shadow: inset 0 0 8px rgba(217,119,6,0.15);"></div>
        
        <!-- Badge text -->
        <div class="text-yellow-100/90 text-[11px] sm:text-sm font-bold text-center leading-none tracking-[0.18em] relative z-10"
             style="text-shadow: 0 1px 3px rgba(0,0,0,0.6), 0 0 10px rgba(217,119,6,0.3);">
          SHERIFF<br>73
        </div>

        <!-- Star emblem (büyütüldü) -->
        <div class="absolute inset-0 flex items-center justify-center opacity-15">
          <svg viewBox="0 0 24 24" fill="currentColor" class="w-14 h-14 text-yellow-200/80">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        </div>

        <!-- İç halka -->
        <div class="absolute inset-2 rounded-full border border-amber-400/25 pointer-events-none"></div>
      </div>

      <!-- Düşme gölgesi (yeni) -->
      <div class="absolute top-full left-1/2 -translate-x-1/2 w-12 h-4 bg-black/40 rounded-full blur-md transition-all duration-300"
           [class.opacity-0]="isDropping"
           [class.group-hover:w-16]="!isDropping"
           [class.group-hover:blur-lg]="!isDropping">
      </div>
    </div>

    <!-- "Drop Badge" label -->
    <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-[9px] text-amber-600/50 uppercase tracking-[0.35em] whitespace-nowrap opacity-0 group-hover:opacity-100 transition-all duration-500 font-mono group-hover:-bottom-12">
      Drop Badge ↓
    </div>

    <!-- Durum göstergesi -->
    <div class="absolute -right-3 top-1/2 -translate-y-1/2 w-1.5 h-8 rounded-full transition-all duration-500"
         [class]="isDropping ? 'bg-red-700/80 shadow-[0_0_8px_#ff0000]' : 'bg-amber-800/30 group-hover:bg-amber-700/60 group-hover:shadow-[0_0_6px_rgba(217,119,6,0.3)]'">
    </div>
  </div>

  <!-- Instruction line (güncellendi) -->
  <p class="font-mono text-[10px] text-amber-800/30 tracking-widest uppercase mt-2">
    Press the badge to transmit · Enter ↵ to send faster
  </p>
</div>
